name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with ruff
        run: ruff format --check .

      - name: Run tests
        env:
          # Tests run without real API keys — services are mocked
          GEMINI_API_KEY: "test-key"
          QDRANT_URL: "http://localhost:6333"
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_SECRET_KEY: ""
        run: pytest tests/ -v

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    # Only build if tests pass
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false          # build only, no push to registry yet
          tags: llmops-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max