services:

  qdrant:

    image: qdrant/qdrant

    container_name: qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

  backend:

    build: .

    container_name: llmops-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - qdrant

volumes:
  qdrant_data: