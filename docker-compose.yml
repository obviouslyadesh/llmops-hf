services:

  qdrant:
    container_name: qdrant
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: .
    container_name: llmops-hf
    ports:
      - "7860:7860"
    env_file:
      - .env
    depends_on:
      - qdrant

volumes:
  qdrant_data: